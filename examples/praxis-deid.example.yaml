# Praxis practice-side de-identification — example config.
# Copy to /etc/praxis-deid/config.yaml (or wherever your scheduler runs from)
# and fill in values. Then:
#
#   praxis-deid run --config /etc/praxis-deid/config.yaml
#
# This file is the contract between your practice and Praxis cloud. The salt
# below is what makes patient anonymization irreversible from Praxis's side —
# treat it like a database password. Rotate it if you suspect compromise;
# every prior export's external_ids will be invalidated automatically (which
# is what you want).

practice_id: 00000000-0000-0000-0000-0000000000a1     # issued to you by Praxis

# api_endpoint and api_key only used when output.type=api (not yet shipping).
# api_endpoint: https://api.praxishealth.ai/ingest
# api_key: <token>

source:
  type: csv
  patients_file:     /var/lib/pm-export/patients.csv
  appointments_file: /var/lib/pm-export/appointments.csv
  providers_file:    /var/lib/pm-export/providers.csv
  procedures_file:   /var/lib/pm-export/procedures.csv
  referrals_file:    /var/lib/pm-export/referrals.csv
  invoices_file:     /var/lib/pm-export/invoices.csv

output:
  type: csv                                            # "csv" or "api"
  directory: /var/lib/praxis-deid/out                  # required when type=csv

deidentification:
  patient_id_salt: REPLACE-ME-WITH-A-LONG-RANDOM-STRING   # required, >= 32 chars (e.g. `openssl rand -hex 32`)
  small_n_threshold: 5                                 # HIPAA Safe Harbor minimum

audit:
  log_path: /var/log/praxis-deid/audit.log             # append-only; rotate via logrotate
